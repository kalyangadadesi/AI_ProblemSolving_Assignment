<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor (ML)</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>📈 Student Performance Predictor</h1>
            <p>A pure JavaScript Machine Learning implementation (Multiple Linear Regression) to predict exam scores based on student metrics.</p>
        </header>

        <main>
            <section class="card">
                <h2>Input Metrics</h2>
                <form id="prediction-form">
                    <div class="form-group">
                        <label for="hours">Hours Studied (per week)</label>
                        <input type="number" id="hours" min="0" max="40" step="0.5" value="5" required>
                    </div>
                    <div class="form-group">
                        <label for="attendance">Attendance Rate (%)</label>
                        <input type="number" id="attendance" min="0" max="100" value="85" required>
                    </div>
                    <div class="form-group">
                        <label for="prev-score">Previous Exam Score</label>
                        <input type="number" id="prev-score" min="0" max="100" value="75" required>
                    </div>
                    <div class="form-group">
                        <label for="assignments">Assignments Completed</label>
                        <input type="number" id="assignments" min="0" max="20" value="5" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-block">Predict Exam Score</button>
                </form>
            </section>

            <section class="card output-card">
                <h2>Predicted Score</h2>
                <div id="prediction-output" class="score-display">-- / 100</div>
                <div class="model-info">
                    <small>Powered by in-browser Multiple Linear Regression trained on synthetic data.</small>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
